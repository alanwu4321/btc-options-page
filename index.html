<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Options Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #09090b;
  --surface: #111113;
  --surface2: #161618;
  --divider: rgba(255,255,255,0.06);
  --text: #dcdcde;
  --text-sec: #7a7a82;
  --text-dim: #44444c;
  --accent: #7c80f0;
  --red: #ef4444;
  --green: #22c55e;
  --yellow: #eab308;
  --blue: #3b82f6;
  --sans: 'IBM Plex Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
::selection { background: rgba(124,128,240,0.15); }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

.container { max-width: 1400px; margin: 0 auto; padding: 0 24px 60px; }

/* ─── Header ─── */
.header {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--divider);
  padding: 10px 24px;
}
.header-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.logo {
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase;
}
.currency-tabs { display: flex; gap: 2px; }
.currency-tab {
  background: none; border: none; color: var(--text-dim);
  padding: 4px 12px; font-size: 12px; font-weight: 500;
  font-family: var(--mono); cursor: pointer; transition: color 0.1s;
}
.currency-tab:hover { color: var(--text-sec); }
.currency-tab.active { color: var(--text); background: var(--surface2); }
.header-right { margin-left: auto; display: flex; gap: 12px; align-items: center; }
.btn-export {
  background: none; border: 1px solid var(--divider); color: var(--text-dim);
  padding: 3px 10px; font-size: 11px; font-family: var(--mono);
  cursor: pointer; transition: color 0.1s;
}
.btn-export:hover { color: var(--text-sec); border-color: rgba(255,255,255,0.12); }
.ts { font-size: 10px; color: var(--text-dim); font-family: var(--mono); }

/* ─── Hero ─── */
.hero { padding: 24px 0 16px; display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
.spot-price { font-size: 36px; font-weight: 600; font-family: var(--mono); letter-spacing: -1px; }
.spot-currency { font-size: 14px; color: var(--text-sec); font-weight: 500; margin-right: 4px; }
.hero-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.tag {
  font-size: 10px; font-weight: 600; font-family: var(--mono);
  padding: 2px 6px; letter-spacing: 0.3px; text-transform: uppercase;
}
.tag-bull { color: var(--green); background: rgba(34,197,94,0.1); }
.tag-bear { color: var(--red); background: rgba(239,68,68,0.1); }
.tag-neut { color: var(--yellow); background: rgba(234,179,8,0.08); }
.tag-info { color: var(--text-sec); background: rgba(255,255,255,0.04); }

/* ─── Signals ─── */
.signals { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 20px; }
.sig {
  font-size: 10px; font-family: var(--mono); padding: 2px 6px;
  color: var(--text-dim); background: rgba(255,255,255,0.02);
}
.sig::before { content: ''; display: inline-block; width: 4px; height: 4px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
.sig.bull::before { background: var(--green); }
.sig.bear::before { background: var(--red); }
.sig.neut::before { background: var(--text-dim); }
.sig.bull { color: var(--green); }
.sig.bear { color: var(--red); }

/* ─── Metrics Row ─── */
.metrics {
  display: grid; grid-template-columns: repeat(6, 1fr);
  gap: 1px; background: var(--divider); margin-bottom: 20px;
}
.m-cell { background: var(--bg); padding: 12px 14px; }
.m-label { font-size: 9px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; font-family: var(--mono); }
.m-val { font-size: 20px; font-weight: 600; font-family: var(--mono); letter-spacing: -0.5px; }
.m-sub { font-size: 10px; color: var(--text-dim); margin-top: 2px; font-family: var(--mono); }
.m-sub.up { color: var(--green); }
.m-sub.down { color: var(--red); }

/* ─── Key Levels ─── */
.levels-section { margin-bottom: 20px; padding: 16px 0; border-top: 1px solid var(--divider); border-bottom: 1px solid var(--divider); }
.levels-title { font-size: 9px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; font-family: var(--mono); }
.levels-track { position: relative; height: 80px; margin: 0 40px; }
.levels-line { position: absolute; top: 40px; left: 0; right: 0; height: 1px; background: var(--divider); }
.lm {
  position: absolute; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center;
  gap: 3px; z-index: 2;
}
.lm.above { top: 0; }
.lm.below { top: 45px; }
.lm-tick { width: 1px; height: 12px; }
.lm-price { font-size: 11px; font-weight: 600; font-family: var(--mono); white-space: nowrap; }
.lm-name { font-size: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; font-family: var(--mono); white-space: nowrap; }
.lm.above .lm-tick { order: 2; }
.lm.above .lm-price { order: 0; }
.lm.above .lm-name { order: 1; margin-bottom: -2px; }
.lm.below .lm-tick { order: 0; }
.lm.below .lm-name { order: 1; margin-top: -2px; }
.lm.below .lm-price { order: 2; }

/* ─── Grid ─── */
.grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 1px; background: var(--divider); margin-bottom: 1px;
}
.panel {
  background: var(--bg); padding: 18px 20px;
  overflow: hidden; min-width: 0;
}
.panel.full { grid-column: 1 / -1; }
.p-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.p-title { font-size: 11px; font-weight: 600; font-family: var(--mono); color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.5px; }
.p-tag { font-size: 9px; font-weight: 600; font-family: var(--mono); padding: 1px 5px; text-transform: uppercase; letter-spacing: 0.3px; }
.p-note { font-size: 10px; color: var(--text-dim); margin-top: 10px; line-height: 1.6; font-family: var(--mono); }
.p-note b { color: var(--text-sec); font-weight: 500; }
.p-explain { font-size: 10px; color: var(--text-dim); margin-top: 8px; line-height: 1.6; font-family: var(--sans); padding-top: 8px; border-top: 1px solid var(--divider); }
.p-explain b { color: var(--text-sec); font-weight: 500; }
.p-formula { font-family: var(--mono); font-size: 9px; color: var(--text-dim); background: var(--surface); padding: 4px 8px; margin: 4px 0; display: inline-block; }
.p-src { font-size: 9px; color: var(--text-dim); font-family: var(--mono); margin-top: 4px; }
.chart-box { position: relative; height: 240px; overflow: hidden; }
.chart-box canvas { max-width: 100%; }
.chart-box.short { height: 200px; }

/* ─── IVT Bars ─── */
.ivt-r { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
.ivt-exp { font-size: 10px; color: var(--text-sec); font-family: var(--mono); min-width: 72px; }
.ivt-d { font-size: 9px; color: var(--text-dim); font-family: var(--mono); min-width: 28px; text-align: right; }
.ivt-bw { flex: 1; height: 14px; background: rgba(255,255,255,0.02); }
.ivt-b { height: 100%; }
.ivt-v { font-size: 10px; font-family: var(--mono); color: var(--text); min-width: 42px; text-align: right; }

/* ─── Wall Bars ─── */
.w-sec { font-size: 9px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin: 8px 0 4px; font-family: var(--mono); }
.w-sec:first-child { margin-top: 0; }
.w-r { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
.w-s { font-size: 10px; font-family: var(--mono); color: var(--text-sec); min-width: 72px; text-align: right; }
.w-bw { flex: 1; height: 12px; background: rgba(255,255,255,0.02); }
.w-b { height: 100%; min-width: 2px; }
.w-b.c { background: var(--green); }
.w-b.p { background: var(--red); }
.w-o { font-size: 9px; font-family: var(--mono); color: var(--text-dim); min-width: 50px; }
.w-pct { font-size: 9px; font-family: var(--mono); min-width: 42px; text-align: right; }

/* ─── Stat Blocks ─── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--divider); margin: 8px 0; }
.stat-cell { background: var(--surface); padding: 12px; text-align: center; }
.stat-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; font-family: var(--mono); margin-bottom: 4px; }
.stat-val { font-size: 22px; font-weight: 600; font-family: var(--mono); }
.stat-sub { font-size: 10px; color: var(--text-dim); margin-top: 4px; font-family: var(--mono); }
.stat-wide { grid-column: 1 / -1; }

/* ─── Tables ─── */
.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.tbl { width: 100%; border-collapse: collapse; min-width: 500px; }
.tbl th {
  text-align: left; font-size: 9px; font-weight: 600; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.5px; font-family: var(--mono);
  padding: 6px 8px; border-bottom: 1px solid var(--divider);
}
.tbl td {
  padding: 5px 8px; border-bottom: 1px solid rgba(255,255,255,0.02);
  font-family: var(--mono); font-size: 10px; color: var(--text-sec);
}
.tbl tr:hover td { background: rgba(255,255,255,0.01); }
.tbl .r { text-align: right; }
.up { color: var(--green); }
.dn { color: var(--red); }

/* ─── Loading ─── */
.loading { display: flex; align-items: center; justify-content: center; min-height: 300px; flex-direction: column; gap: 12px; }
.spinner { width: 24px; height: 24px; border: 2px solid var(--divider); border-top-color: var(--text-dim); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 11px; color: var(--text-dim); font-family: var(--mono); }
.error-box { background: rgba(239,68,68,0.06); padding: 20px; text-align: center; color: var(--red); margin: 40px 0; font-family: var(--mono); font-size: 12px; }

/* ─── Snapshot ─── */
.snap-bar { background: rgba(124,128,240,0.06); padding: 6px 12px; font-size: 10px; color: var(--accent); font-family: var(--mono); margin-bottom: 12px; display: none; }
.snap-bar.on { display: block; }

/* ─── Responsive ─── */

/* Tablet */
@media (max-width: 1100px) {
  .container { padding: 0 16px 60px; }
  .metrics { grid-template-columns: repeat(3, 1fr); }
}

/* Small tablet / large phone */
@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(3, 1fr); }
  .spot-price { font-size: 28px; }
  .hero { flex-direction: column; align-items: flex-start; gap: 10px; }
  .levels-track { margin: 0 20px; }
  .lm-price { font-size: 10px; }
  .lm-name { font-size: 8px; }
  .stat-val { font-size: 18px; }
  .p-explain { font-size: 11px; line-height: 1.7; }
}

/* Phone */
@media (max-width: 600px) {
  .container { padding: 0 12px 40px; }
  .header { padding: 10px 12px; }
  .header-inner { gap: 8px; }
  .logo { font-size: 11px; }
  .currency-tabs { gap: 2px; overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
  .currency-tab { padding: 6px 12px; font-size: 12px; flex-shrink: 0; min-height: 32px; }
  .header-right { gap: 8px; }
  .ts { font-size: 10px; }
  .btn-export { font-size: 11px; padding: 6px 12px; min-height: 32px; }

  .hero { padding: 16px 0 12px; }
  .spot-price { font-size: 24px; }
  .spot-currency { font-size: 13px; }
  .hero-tags { gap: 5px; }
  .tag { font-size: 10px; padding: 3px 7px; }

  .signals { gap: 4px; margin-bottom: 16px; }
  .sig { font-size: 10px; padding: 4px 8px; line-height: 1.4; }

  .metrics { grid-template-columns: repeat(2, 1fr); }
  .m-cell { padding: 12px; }
  .m-label { font-size: 9px; }
  .m-val { font-size: 18px; }
  .m-sub { font-size: 10px; line-height: 1.4; }

  .levels-section { padding: 14px 0; }
  .levels-track { height: 80px; margin: 0 8px; }
  .lm-price { font-size: 10px; }
  .lm-name { font-size: 7px; letter-spacing: 0.3px; }
  .lm-tick { height: 10px; }

  .panel { padding: 16px 14px; }
  .p-head { margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
  .p-title { font-size: 11px; }
  .p-tag { font-size: 9px; padding: 2px 6px; }
  .p-note { font-size: 10px; line-height: 1.6; }
  .p-explain { font-size: 10px; line-height: 1.7; }
  .p-formula { font-size: 9px; padding: 4px 8px; word-break: break-all; }
  .p-src { font-size: 9px; }

  .chart-box { height: 200px; }
  .chart-box.short { height: 180px; }

  .ivt-r { gap: 6px; padding: 4px 0; }
  .ivt-exp { font-size: 10px; min-width: 64px; }
  .ivt-d { font-size: 9px; min-width: 26px; }
  .ivt-bw { height: 14px; }
  .ivt-v { font-size: 10px; min-width: 40px; }

  .w-r { gap: 5px; padding: 3px 0; }
  .w-s { font-size: 10px; min-width: 64px; }
  .w-bw { height: 12px; }
  .w-o { font-size: 9px; min-width: 44px; }
  .w-pct { font-size: 9px; min-width: 38px; }
  .w-sec { font-size: 9px; margin: 10px 0 5px; }

  .stat-val { font-size: 18px; }
  .stat-label { font-size: 9px; }
  .stat-sub { font-size: 10px; }
  .stat-cell { padding: 12px 10px; }

  .tbl { min-width: 420px; }
  .tbl th { font-size: 9px; padding: 6px 5px; }
  .tbl td { font-size: 10px; padding: 6px 5px; }
}

/* Small phone */
@media (max-width: 420px) {
  .container { padding: 0 8px 32px; }
  .spot-price { font-size: 22px; }
  .m-val { font-size: 16px; }
  .metrics { grid-template-columns: 1fr 1fr; }
  .stat-grid { grid-template-columns: 1fr; }
  .stat-wide { grid-column: auto; }
  .levels-track { margin: 0 4px; }
  .lm-price { font-size: 9px; }
  .lm-name { font-size: 6px; }
  .chart-box { height: 180px; }
  .chart-box.short { height: 160px; }
  .panel { padding: 14px 10px; }
  .tbl { min-width: 360px; }
}

function fp(v) {
  if (v == null || isNaN(v)) return '—';
  const a = Math.abs(v), s = v < 0 ? '-' : '';
  if (a >= 10000) return s + '$' + a.toLocaleString('en-US', {maximumFractionDigits: 0});
  if (a >= 10) return s + '$' + a.toLocaleString('en-US', {minimumFractionDigits: 1, maximumFractionDigits: 1});
  if (a >= 1) return s + '$' + a.toFixed(2);
  if (a >= 0.01) return s + '$' + a.toFixed(4);
  return s + '$' + a.toFixed(6);
}
function pct(v, s) { const p = (v / s - 1) * 100; return (p >= 0 ? '+' : '') + p.toFixed(1) + '%'; }
function fn(v, d=0) { return v == null || isNaN(v) ? '—' : v.toLocaleString('en-US', {minimumFractionDigits: d, maximumFractionDigits: d}); }
function fd(v) {
  const a = Math.abs(v);
  if (a >= 1e9) return (v/1e9).toFixed(1)+'B';
  if (a >= 1e6) return (v/1e6).toFixed(1)+'M';
  if (a >= 1e3) return (v/1e3).toFixed(0)+'K';
  return v.toFixed(0);
}

// Extract entries from dicts with float-string keys (e.g. "58000.0")
function dictEntries(obj, spot, range=0.2) {
  return Object.entries(obj || {})

    .filter(([s]) => s >= spot * (1-range) && s <= spot * (1+range))

}

  h += `<div class="m-cell"><div class="m-label">γ Flip</div><div class="m-val">${fp(gex.gamma_flip)}</div><div class="m-sub ${spot > gex.gamma_flip ? 'up' : 'down'}">${pct(gex.gamma_flip, spot)} · ${spot > gex.gamma_flip ? 'above' : 'below'}</div></div>`;
  h += `<div class="m-cell"><div class="m-label">P/C Ratio</div><div class="m-val">${(pc.by_oi||0).toFixed(3)}</div><div class="m-sub">${fn(pc.put_oi)}P / ${fn(pc.call_oi)}C</div></div>`;
  h += `<div class="m-cell"><div class="m-label">RR 25Δ</div><div class="m-val ${rr.rr_25d > 2 ? 'up' : rr.rr_25d < -2 ? 'dn' : ''}">${(rr.rr_25d||0) >= 0 ? '+' : ''}${(rr.rr_25d||0).toFixed(2)}%</div><div class="m-sub">${rr.bias||''}</div></div>`;
  h += `<div class="m-cell"><div class="m-label">Net Delta</div><div class="m-val ${de.net_delta_usd > 0 ? 'up' : 'dn'}">${de.net_delta_usd >= 0 ? '+' : ''}$${fd(de.net_delta_usd||0)}</div><div class="m-sub">${de.bias||''}</div></div>`;
  h += `<div class="m-cell"><div class="m-label">IV Skew</div><div class="m-val ${sk.slope > 5 ? 'dn' : sk.slope < -5 ? 'up' : ''}">${(sk.slope||0) >= 0 ? '+' : ''}${(sk.slope||0).toFixed(2)}%</div><div class="m-sub">${sk.interpretation||''}</div></div>`;
  h += '</div>';

  // Key Levels — staggered above/below, dedup overlapping prices
  const rawLvls = [
    kl.put_gamma_wall && { v: kl.put_gamma_wall, name: 'Put γ Wall', color: 'var(--red)', pri: 1 },
    kl.nearest_put_wall && { v: kl.nearest_put_wall, name: 'Put Wall', color: 'var(--red)', pri: 2 },
    kl.gex_flip && { v: kl.gex_flip, name: 'γ Flip', color: 'var(--accent)', pri: 3 },
    { v: spot, name: 'Spot', color: 'var(--text)', pri: 5 },
    kl.max_pain && { v: kl.max_pain, name: 'Max Pain', color: 'var(--yellow)', pri: 4 },
    kl.nearest_call_wall && { v: kl.nearest_call_wall, name: 'Call Wall', color: 'var(--green)', pri: 2 },
    kl.call_gamma_wall && { v: kl.call_gamma_wall, name: 'Call γ Wall', color: 'var(--green)', pri: 1 },
  ].filter(Boolean).sort((a, b) => a.v - b.v);
  // Merge levels within 0.5% of each other — keep highest priority, combine names
  const lvls = [];
  rawLvls.forEach(l => {
    const existing = lvls.find(e => Math.abs(e.v - l.v) / spot < 0.005);
    if (existing) {
      existing.name += ' / ' + l.name;
      if (l.pri > existing.pri) { existing.color = l.color; existing.pri = l.pri; }
    } else { lvls.push({...l}); }
  });

  if (lvls.length > 1) {
    const lo = Math.min(...lvls.map(l=>l.v)) * 0.995;
    const hi = Math.max(...lvls.map(l=>l.v)) * 1.005;
    const rng = hi - lo;
    h += `<div class="levels-section"><div class="levels-title">Key Levels</div><div class="levels-track"><div class="levels-line"></div>`;
    lvls.forEach((l, i) => {
      const left = ((l.v - lo) / rng * 100).toFixed(1);
      const pos = i % 2 === 0 ? 'above' : 'below';
      h += `<div class="lm ${pos}" style="left:${left}%">
        <div class="lm-price" style="color:${l.color}">${fp(l.v)}</div>
        <div class="lm-name" style="color:${l.color}">${l.name}</div>
        <div class="lm-tick" style="background:${l.color}"></div>
      </div>`;
    });
    h += '</div></div>';
  }

  // Grid
  h += '<div class="grid">';

  // GEX
  h += `<div class="panel"><div class="p-head"><span class="p-title">GEX by Strike</span><span class="p-tag" style="color:${gex.total_gex > 0 ? 'var(--green)' : 'var(--red)'}">${gex.total_gex > 0 ? 'NET +' : 'NET −'}</span></div>
    <div class="chart-box"><canvas id="chartGex"></canvas></div>
    <div class="p-note"><b>Flip:</b> ${fp(gex.gamma_flip)} · <b>Call γ wall:</b> ${fp(gex.call_gamma_wall)} · <b>Put γ wall:</b> ${fp(gex.put_gamma_wall)} · <b>Total GEX:</b> ${fd(gex.total_gex||0)}</div>
    <div class="p-explain"><b>What:</b> Map of dealer hedging pressure at each strike. When MMs sell options, they delta-hedge — gamma determines whether hedging stabilizes or destabilizes price.<br><b>Why it matters:</b> Above the γ flip = positive gamma = moves dampened, range-bound. Below = negative gamma = moves amplified, trending. The flip level is the single most actionable line — it's where market regime changes.<br><span class="p-formula">GEX(K) = Gamma(K) × OI(K) × Spot² / 100 · calls +, puts −</span><br><span class="p-src">Source: Deribit public API, Black-Scholes computed locally</span></div></div>`;

  // IV Term Structure
  const ivt = d.iv_term || {};
  const ts = ivt.term_structure || [];
  h += `<div class="panel"><div class="p-head"><span class="p-title">IV Term Structure</span><span class="p-tag" style="color:${ivt.shape?.includes('backwardation') ? 'var(--red)' : 'var(--text-sec)'}">${ivt.shape || 'flat'}</span></div>`;
  if (ts.length) {
    const maxIV = Math.max(...ts.map(t => t.atm_iv));
    ts.forEach(t => {
      const w = Math.max(4, t.atm_iv / maxIV * 100);
      const c = t.atm_iv > maxIV * 0.85 ? 'var(--accent)' : 'var(--blue)';
      h += `<div class="ivt-r"><span class="ivt-exp">${t.expiry}</span><span class="ivt-d">${t.dte}d</span><div class="ivt-bw"><div class="ivt-b" style="width:${w}%;background:${c}"></div></div><span class="ivt-v">${t.atm_iv.toFixed(1)}%</span></div>`;
    });
  }
  h += `<div class="p-note">${ivt.shape?.includes('backwardation') ? 'Near-term IV elevated — short-term fear or event risk' : 'Normal contango — longer-dated options priced higher'}</div>
    <div class="p-explain"><b>What:</b> ATM implied volatility across expiration dates.<br><b>Contango</b> (upward) = calm now, uncertainty later. Normal. <b>Backwardation</b> (inverted) = fear NOW — short-dated IV spikes above long-dated. Happens before FOMC, CPI, protocol upgrades, or during sell-offs.<br><b>Why it matters:</b> Sudden steepening = market pricing near-term catalyst. Calendar spread opps when shape is extreme. Shape changes signal regime transitions.<br><span class="p-src">Source: Deribit mark_iv per contract, ATM = nearest-to-spot strike</span></div></div>`;

  // IV Skew
  h += `<div class="panel"><div class="p-head"><span class="p-title">IV Skew</span><span class="p-tag" style="color:${sk.slope > 5 ? 'var(--red)' : sk.slope < -5 ? 'var(--green)' : 'var(--text-sec)'}">${sk.slope > 0 ? '+' : ''}${(sk.slope||0).toFixed(1)}%</span></div>
    <div class="chart-box short"><canvas id="chartSkew"></canvas></div>
    <div class="p-note">${sk.slope > 5 ? 'OTM puts at IV premium — downside hedging demand' : sk.slope < -5 ? 'OTM calls at premium — upside speculation' : 'Balanced risk pricing'}</div>
    <div class="p-explain"><b>What:</b> IV plotted against strike price for the nearest expiry. The "smile" or "smirk" shape reveals where option demand concentrates.<br><b>Smirk</b> (puts expensive) = demand for downside protection. <b>Smile</b> (both tails high) = uncertainty in both directions, common before binary events. <b>Flat</b> = complacency, no one paying for protection.<br><b>Why it matters:</b> Slope magnitude shows conviction level. >5% put skew = significant hedging demand. The specific strikes where IV peaks show exactly which prices traders fear.<br><span class="p-formula">Skew = avg(OTM put IV at -10%) − avg(OTM call IV at +10%)</span><br><span class="p-src">Source: Deribit mark_iv, filtered to ±30% of spot</span></div></div>`;

  // Call/Put Walls
  const walls = d.call_put_walls || d.walls || {};
  const cw = walls.call_walls || [], pw = walls.put_walls || [];
  const moi = Math.max(...[...cw,...pw].map(w => w.oi||0), 1);
  h += `<div class="panel"><div class="p-head"><span class="p-title">Call / Put Walls</span></div>`;
  h += '<div class="w-sec" style="color:var(--green)">Call — Resistance</div>';
  cw.forEach(w => {
    h += `<div class="w-r"><span class="w-s">${fp(w.strike)}</span><div class="w-bw"><div class="w-b c" style="width:${Math.max(3,w.oi/moi*100)}%"></div></div><span class="w-o">${fn(w.oi)}</span><span class="w-pct up">${w.pct_from_spot>=0?'+':''}${w.pct_from_spot}%</span></div>`;
  });
  h += '<div class="w-sec" style="color:var(--red)">Put — Support</div>';
  pw.forEach(w => {
    h += `<div class="w-r"><span class="w-s">${fp(w.strike)}</span><div class="w-bw"><div class="w-b p" style="width:${Math.max(3,w.oi/moi*100)}%"></div></div><span class="w-o">${fn(w.oi)}</span><span class="w-pct dn">${w.pct_from_spot>=0?'+':''}${w.pct_from_spot}%</span></div>`;
  });
  h += `<div class="p-explain"><b>What:</b> Top 5 call/put OI concentrations by strike (3% minimum spacing to avoid clustering).<br><b>Call walls</b> (above spot) = resistance — dealers who sold calls buy the underlying as price rises, creating selling pressure at the wall. <b>Put walls</b> (below spot) = support — dealers who sold puts sell the underlying as price falls, creating buying pressure.<br><b>Why it matters:</b> These are the most stable metric — they represent weeks of accumulated positioning. Combined with max pain, they define the options-driven "range" for the expiry cycle.<br><span class="p-src">Source: Deribit OI per strike, top expiry by total OI</span></div></div>`;

  // Delta Exposure
  h += `<div class="panel"><div class="p-head"><span class="p-title">Delta Exposure</span><span class="p-tag ${de.net_delta_usd > 0 ? 'up' : 'dn'}">${de.bias||''}</span></div>
    <div class="chart-box"><canvas id="chartDelta"></canvas></div>
    <div class="p-note"><b>Net:</b> $${fd(de.net_delta_usd||0)} · <b>Call Δ:</b> $${fd(de.total_call_delta_usd||0)} · <b>Put Δ:</b> $${fd(de.total_put_delta_usd||0)}</div>
    <div class="p-explain"><b>What:</b> Dollar-weighted directional exposure across all strikes. Each option's delta × OI × spot = its notional directional exposure.<br><b>Why it matters:</b> Net long delta = market has bullish directional risk. Net short = bearish. The distribution by strike shows where the directional bets concentrate. Large clusters = magnetic levels where dealer hedging creates flow.<br><span class="p-formula">Delta_exposure(K) = BS_delta(K) × OI(K) × Spot</span><br><span class="p-src">Source: Deribit OI + Black-Scholes delta computed locally</span></div></div>`;

  // Risk Reversal
  h += `<div class="panel"><div class="p-head"><span class="p-title">25Δ Risk Reversal</span><span class="p-tag ${rr.rr_25d > 2 ? 'up' : rr.rr_25d < -2 ? 'dn' : ''}">${rr.bias||''}</span></div>
    <div class="stat-grid">
      <div class="stat-cell"><div class="stat-label">25Δ Call</div><div class="stat-val up">${fp(rr.call_25d?.strike||0)}</div><div class="stat-sub">IV ${(rr.call_25d?.iv||0).toFixed(1)}%</div></div>
      <div class="stat-cell"><div class="stat-label">25Δ Put</div><div class="stat-val dn">${fp(rr.put_25d?.strike||0)}</div><div class="stat-sub">IV ${(rr.put_25d?.iv||0).toFixed(1)}%</div></div>
      <div class="stat-cell stat-wide"><div class="stat-label">Spread</div><div class="stat-val ${rr.rr_25d > 2 ? 'up' : rr.rr_25d < -2 ? 'dn' : ''}">${(rr.rr_25d||0)>=0?'+':''}${(rr.rr_25d||0).toFixed(2)}%</div></div>
    </div>
    <div class="p-explain"><b>What:</b> Difference in IV between 25-delta OTM call and 25-delta OTM put. Measures directional conviction in the options market.<br><span class="p-formula">RR25 = IV(25Δ call) − IV(25Δ put)</span><br><b>Positive</b> = calls more expensive = bullish sentiment — traders paying up for upside. <b>Negative</b> = puts more expensive = hedging demand — traders buying protection.<br><b>Why it matters:</b> In crypto, RR is typically positive (long-biased speculators buy calls). A flip to negative is rare and meaningful — it signals institutional fear. Magnitude >3% is noteworthy. One of the most interesting metrics because it captures directional conviction better than P/C ratio alone.<br><span class="p-src">Source: Deribit mark_iv + Black-Scholes delta matching</span></div></div>`;

  // P/C Ratio
  h += `<div class="panel"><div class="p-head"><span class="p-title">Put/Call Ratio</span><span class="p-tag">${pc.interpretation||''}</span></div>
    <div class="stat-grid">
      <div class="stat-cell"><div class="stat-label">By OI</div><div class="stat-val">${(pc.by_oi||0).toFixed(3)}</div><div class="stat-sub"><span class="dn">${fn(pc.put_oi)}P</span> / <span class="up">${fn(pc.call_oi)}C</span></div></div>
      <div class="stat-cell"><div class="stat-label">By Volume</div><div class="stat-val">${(pc.by_volume||0).toFixed(3)}</div><div class="stat-sub"><span class="dn">${fn(pc.put_volume)}P</span> / <span class="up">${fn(pc.call_volume)}C</span></div></div>
    </div>
    <div class="p-explain"><b>What:</b> Ratio of put OI (or volume) to call OI. Simple measure of market positioning.<br><span class="p-formula">PCR = Put_OI / Call_OI</span><br><b>For crypto:</b> <b>&lt;0.7</b> = call-dominated (normal — crypto has natural long bias). <b>~0.7</b> = neutral baseline. <b>&gt;1.0</b> = unusual, signals heavy hedging or fear — often marks bottoms (contrarian indicator).<br><b>Why it matters:</b> Extreme readings are contrarian — too many puts = everyone already hedged = potential bottom. Volume P/C diverging from OI P/C signals a short-term positioning shift. Track changes over time, not just absolute levels.<br><span class="p-src">Source: Deribit OI and volume per contract, all expiries</span></div></div>`;

  // Block Trades (native block_trade_id from Deribit)
  const bt = d.block_trades || {};
  const blockTrades = bt.block_trades || [];
  const topTrades = bt.top_trades || [];
  const bias = bt.bias || 'mixed';
  h += `<div class="panel full"><div class="p-head"><span class="p-title">Institutional Block Trades</span><span class="p-tag" style="color:${bias==='bullish' ? 'var(--green)' : bias==='bearish' ? 'var(--red)' : 'var(--text-sec)'}">${bias.toUpperCase()} · ${bt.block_count||0} blocks · ${fp(bt.total_block_premium_usd||0)} premium</span></div>`;
  if (blockTrades.length) {
    h += `<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Time</th><th>Block ID</th><th class="r">Premium</th><th class="r">Notional</th><th>Legs</th><th>Direction</th><th>Lean</th></tr></thead><tbody>`;
    blockTrades.forEach(b => {
      const legsStr = (b.legs||[]).slice(0,3).map(l=>`${l.direction} ${l.instrument}`).join(', ');
      const t = (b.time||'').slice(11,16);
      h += `<tr><td>${t}</td><td style="color:var(--text-dim);font-size:10px">${b.block_trade_id}</td><td class="r" style="font-weight:600;color:var(--accent)">${fp(b.total_premium_usd)}</td><td class="r">${fp(b.total_notional_usd)}</td><td style="font-size:10px;color:var(--text)">${b.num_legs} legs</td><td class="${b.net_direction==='buy'?'up':'dn'}" style="font-weight:600">${(b.net_direction||'').toUpperCase()}</td><td>${b.call_put_lean==='call'?'<span class="up">CALL</span>':b.call_put_lean==='put'?'<span class="dn">PUT</span>':'MIXED'}</td></tr>`;
      h += `<tr><td colspan="7" style="padding:2px 8px 8px;font-size:10px;color:var(--text-dim);border-bottom:1px solid var(--divider)">${legsStr}</td></tr>`;
    });
    h += '</tbody></table></div>';
  } else {
    h += '<div style="padding:12px;color:var(--text-dim);font-family:var(--mono);font-size:11px;text-align:center">No Deribit-flagged block trades in lookback window</div>';
  }
  // Top individual trades (always shown)
  if (topTrades.length) {
    h += `<div style="margin-top:8px;padding:0 12px"><div style="font-size:10px;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Top Trades by Premium</div></div>`;
    h += `<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Time</th><th>Side</th><th>Instrument</th><th class="r">Premium</th><th class="r">IV</th></tr></thead><tbody>`;
    topTrades.slice(0,5).forEach(t => {
      const time = (t.time||'').slice(11,16);
      h += `<tr><td>${time}</td><td class="${t.direction==='buy'?'up':'dn'}" style="font-weight:600">${(t.direction||'').toUpperCase()}</td><td style="color:var(--text)">${t.instrument}</td><td class="r" style="font-weight:600">${fp(t.premium_usd)}</td><td class="r">${(t.iv||0).toFixed(1)}%</td></tr>`;
    });
    h += '</tbody></table></div>';
  }
  h += `<div class="p-note"><b>Scanned:</b> ${fn(bt.total_trades_scanned||0)} trades · <b>Blocks (block_trade_id):</b> ${bt.block_count||0} · <b>Top premium:</b> ${fp(bt.top_trade_premium_usd||0)}</div>
    <div class="p-explain"><b>What:</b> Institutional OTC block trades identified via Deribit's native <code>block_trade_id</code> field. These are negotiated off-exchange via RFQ platforms (Paradigm $10B+/mo, Greeks.live $530M rolling 30d) then cleared on Deribit. Multi-leg blocks are grouped by ID with aggregated premium.<br><b>Why it matters:</b> Block trades are the HIGHEST SIGNAL data. Unlike retail orderbook trades, blocks represent deliberate institutional positioning — someone paid a dealer to fill a specific size. The premium paid is real capital at risk.<br><span class="p-formula">Block detection: Deribit block_trade_id field · Paginated 24h lookback · Multi-leg grouping</span><br><span class="p-src">Source: Deribit get_last_trades_by_currency, paginated with block_trade_id filtering</span></div></div>`;

  // FOMC
  const es = d.event_study || {};
  const evts = es.events || [];
  h += `<div class="panel full"><div class="p-head"><span class="p-title">FOMC Event Study</span><span class="p-tag">${es.sample_size||0} meetings</span></div>`;
  if (evts.length) {
    h += `<div style="display:flex;gap:1px;background:var(--divider);margin-bottom:12px">
      <div class="stat-cell" style="flex:1"><div class="stat-label">Avg T-7→T+7</div><div class="stat-val ${(es.avg_return_total_pct||0)>=0?'up':'dn'}" style="font-size:18px">${(es.avg_return_total_pct||0)>=0?'+':''}${(es.avg_return_total_pct||0).toFixed(2)}%</div></div>
      <div class="stat-cell" style="flex:1"><div class="stat-label">Pre-FOMC</div><div class="stat-val ${(es.avg_return_pre_pct||0)>=0?'up':'dn'}" style="font-size:18px">${(es.avg_return_pre_pct||0)>=0?'+':''}${(es.avg_return_pre_pct||0).toFixed(2)}%</div></div>
      <div class="stat-cell" style="flex:1"><div class="stat-label">Post-FOMC</div><div class="stat-val ${(es.avg_return_post_pct||0)>=0?'up':'dn'}" style="font-size:18px">${(es.avg_return_post_pct||0)>=0?'+':''}${(es.avg_return_post_pct||0).toFixed(2)}%</div></div>
    </div>`;
    h += `<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Date</th><th class="r">Pre</th><th class="r">Post</th><th class="r">Total</th><th class="r">Price</th></tr></thead><tbody>`;
    evts.forEach(e => {
      h += `<tr><td style="color:var(--text)">${e.date}</td><td class="r ${e.return_pre_pct>=0?'up':'dn'}">${e.return_pre_pct>=0?'+':''}${e.return_pre_pct.toFixed(2)}%</td><td class="r ${e.return_post_pct>=0?'up':'dn'}">${e.return_post_pct>=0?'+':''}${e.return_post_pct.toFixed(2)}%</td><td class="r ${e.return_total_pct>=0?'up':'dn'}">${e.return_total_pct>=0?'+':''}${e.return_total_pct.toFixed(2)}%</td><td class="r">${fp(e.price_t0)}</td></tr>`;
    });
    h += '</tbody></table></div>';
  } else { h += `<div style="padding:16px;color:var(--text-dim);font-family:var(--mono);font-size:11px;text-align:center">${es.note||'No data'}</div>`; }
  h += `<div class="p-explain"><b>What:</b> ${d.currency} price behavior in the ±7 day window around each FOMC rate decision over the past year. Pre-FOMC = T-7 to T (positioning week). Post-FOMC = T to T+7 (reaction week).<br><b>Why it matters:</b> FOMC dates create predictable volatility cycles. Pre-meeting: ~1.8 vol point uptick in ATM IV during the 2-week window. Traders can position for the volatility expansion (buy straddles) or the contraction after (sell vol). Historical pattern shows whether the asset trends before/after meetings or mean-reverts. Calendar spread opportunities around these dates.<br><span class="p-src">Source: Deribit perpetual daily candles, 365-day history. FOMC dates: 2025-2026 schedule.</span></div></div>`;

  h += '</div>'; // grid
  document.getElementById('content').innerHTML = h;
  setTimeout(() => renderCharts(d), 30);
}

function renderCharts(d) {
  const spot = d.spot;
  Object.values(charts).forEach(c => c.destroy());

  const ttOpts = { backgroundColor: '#161618', titleColor: '#dcdcde', bodyColor: '#7a7a82', borderColor: 'rgba(255,255,255,0.06)', borderWidth: 1, padding: 8 };

  // GEX
  const gexEntries = dictEntries(d.gex?.gex_by_strike, spot);
  const gexEl = document.getElementById('chartGex');
  if (gexEl && gexEntries.length) {
    charts.gex = new Chart(gexEl, {
      type: 'bar',
      data: {
        labels: gexEntries.map(([s]) => fp(s)),
        datasets: [{ data: gexEntries.map(([,v]) => v), backgroundColor: gexEntries.map(([,v]) => v >= 0 ? 'rgba(34,197,94,0.7)' : 'rgba(239,68,68,0.7)'), borderWidth: 0, borderRadius: 1, barPercentage: 0.85 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { ...ttOpts, callbacks: { label: c => 'GEX ' + fd(c.raw) } } },
        scales: {
          x: { grid: { display: false }, ticks: { maxRotation: 50, font: { size: 8 } } },
          y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { callback: v => fd(v) } }
        }
      }
    });
  }

  // Skew
  const skPuts = (d.iv_skew?.otm_puts || []).sort((a,b) => a.strike - b.strike);
  const skCalls = (d.iv_skew?.otm_calls || []).sort((a,b) => a.strike - b.strike);
  const allM = [...new Set([...skPuts.map(p=>p.moneyness_pct),...skCalls.map(c=>c.moneyness_pct)])].sort((a,b)=>a-b);
  const skewEl = document.getElementById('chartSkew');
  if (skewEl && allM.length) {
    charts.skew = new Chart(skewEl, {
      type: 'line',
      data: {
        labels: allM.map(m => m.toFixed(1)+'%'),
        datasets: [
          { label: 'Puts', data: allM.map(m => { const p = skPuts.find(x=>x.moneyness_pct===m); return p?p.iv:null; }), borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.05)', fill: true, tension: 0.3, pointRadius: 1.5, borderWidth: 1.5 },
          { label: 'Calls', data: allM.map(m => { const c = skCalls.find(x=>x.moneyness_pct===m); return c?c.iv:null; }), borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.05)', fill: true, tension: 0.3, pointRadius: 1.5, borderWidth: 1.5 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false, spanGaps: true,
        plugins: { legend: { position: 'top', labels: { boxWidth: 8, padding: 10, font: { size: 9 } } }, tooltip: ttOpts },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.02)' }, title: { display: true, text: 'Moneyness', color: '#44444c', font: { size: 9 } } },
          y: { grid: { color: 'rgba(255,255,255,0.02)' }, title: { display: true, text: 'IV %', color: '#44444c', font: { size: 9 } } }
        }
      }
    });
  }

  // Delta
  const deEntries = dictEntries(d.delta_exposure?.delta_by_strike, spot);
  const deltaEl = document.getElementById('chartDelta');
  if (deltaEl && deEntries.length) {
    charts.delta = new Chart(deltaEl, {
      type: 'bar',
      data: {
        labels: deEntries.map(([s]) => fp(s)),
        datasets: [{ data: deEntries.map(([,v]) => v), backgroundColor: deEntries.map(([,v]) => v >= 0 ? 'rgba(34,197,94,0.65)' : 'rgba(239,68,68,0.65)'), borderWidth: 0, borderRadius: 1, barPercentage: 0.85 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { ...ttOpts, callbacks: { label: c => '$' + fd(c.raw) } } },
        scales: {
          x: { grid: { display: false }, ticks: { maxRotation: 50, font: { size: 8 } } },
          y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { callback: v => '$'+fd(v) } }
        }
      }
    });
  }
}

async function loadCurrency(c) {
  currentCurrency = c;
  document.querySelectorAll('.currency-tab').forEach(t => t.classList.toggle('active', t.dataset.c === c));
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">loading ' + c + '...</div></div>';
  try {
    const r = await fetch('/api/report?currency=' + c);
    render(await r.json());
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="error-box">${e.message}</div>`;
  }
}

document.getElementById('currencyTabs').addEventListener('click', e => { const b = e.target.closest('.currency-tab'); if (b) loadCurrency(b.dataset.c); });
document.getElementById('btnSnapshot').addEventListener('click', () => window.open('/snapshot?currency=' + currentCurrency, '_blank'));

if (isSnapshot) { render(window.__SNAPSHOT__); document.getElementById('btnSnapshot').style.display = 'none'; }
else loadCurrency('BTC');
</script>
</body>
</html>
